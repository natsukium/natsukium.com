name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    name: Code standards & build
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: natsukium
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: "Lint and format"
        run: nix flake check
      - name: "Install dependencies"
        run: nix develop --command bash -c "pnpm install --frozen-lockfile"
      - name: "Run tests"
        run: nix develop --command bash -c "pnpm run test"
      - name: "Build the project"
        run: nix develop --command bash -c "pnpm run build"

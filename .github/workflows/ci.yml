name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    name: Code standards & build
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: cachix/install-nix-action@616559265b40713947b9c190a8ff4b507b5df49b # v31
      - uses: cachix/cachix-action@3ba601ff5bbb07c7220846facfa2cd81eeee15a1 # v16
        with:
          name: natsukium
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: "Lint and format"
        run: nix flake check
      - name: "Install dependencies"
        run: nix develop --command bash -c "pnpm install --frozen-lockfile"
      - name: "Run tests"
        run: nix develop --command bash -c "pnpm run test"
      - name: "Build the project"
        run: nix develop --command bash -c "pnpm run build"
